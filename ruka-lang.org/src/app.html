<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=DM+Serif+Display:ital@0;1&family=Intel+One+Mono:ital,wght@0,300..700;1,300..700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Resolve the theme before first paint so the page never flashes the
			// wrong palette. Mirrors the logic in $lib/theme.ts — keep them in
			// sync. Stored value wins; otherwise fall back to OS preference.
			(function () {
				try {
					var stored = localStorage.getItem("ruka-theme");
					var theme =
						stored === "light" || stored === "dark"
							? stored
							: window.matchMedia("(prefers-color-scheme: light)").matches
								? "light"
								: "dark";
					document.documentElement.setAttribute("data-theme", theme);
				} catch (_) {
					document.documentElement.setAttribute("data-theme", "dark");
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
